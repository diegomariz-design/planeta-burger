<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#04090b" />
<title>Planeta Burger · Admin 👽🍔</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#04090b; --panel:#0c2129; --panel2:#102b34; --petroleo:#0a2a33; --petroleo2:#06181d;
    --turquesa:#0fb8c4; --neon:#39ff5b; --amarelo:#ffd02e; --texto:#eafff2; --cinza:#9fc4c9; --cinza2:#6f8e93;
    --borda:rgba(57,255,91,.14); --borda2:rgba(159,196,201,.12); --ok:#39ff5b; --erro:#ff5a5a;
    --warn:#ffd02e; --info:#0fb8c4; --ouro:#ffd02e;
    --grad:linear-gradient(145deg,#39ff5b,#0fb8c4);
    --shadow:0 10px 30px rgba(0,0,0,.55);
    --sidebar:236px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--texto);-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;border:none;}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:#173a44;border-radius:9px;}
  .neon{color:var(--neon);text-shadow:0 0 14px rgba(57,255,91,.55);}

  /* ===== LOGIN ===== */
  .login{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:24px;
    background:radial-gradient(700px 360px at 50% -10%, rgba(57,255,91,.18), transparent 60%), var(--bg);}
  .login-card{width:100%;max-width:360px;text-align:center;background:linear-gradient(180deg,var(--panel),var(--petroleo2));
    border:1px solid var(--borda);border-radius:22px;padding:34px 26px;box-shadow:0 0 44px rgba(15,184,196,.22);}
  .login-logo{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:2px;}
  .login-sub{color:var(--cinza2);font-size:12px;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
  .login-slogan{color:var(--turquesa);font-size:12.5px;margin-bottom:20px;font-weight:600;}
  .login input{width:100%;background:var(--petroleo2);border:1px solid var(--borda2);border-radius:12px;color:#fff;
    padding:14px;font-size:18px;text-align:center;letter-spacing:6px;outline:none;margin-bottom:6px;}
  .login input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(57,255,91,.15);}
  .login .who{letter-spacing:0;font-size:15px;text-align:left;}
  .login-btn{width:100%;margin-top:12px;padding:14px;border-radius:12px;font-weight:800;font-size:16px;color:#04161a;
    background:var(--grad);box-shadow:0 6px 22px rgba(57,255,91,.32);}
  .login-err{color:var(--erro);font-size:13px;min-height:18px;margin-top:8px;}
  .login-hint{color:var(--cinza2);font-size:11px;margin-top:14px;}

  /* ===== SHELL ===== */
  .shell{display:none;min-height:100vh;}
  .shell.on{display:block;}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar);background:var(--petroleo2);
    border-right:1px solid var(--borda2);display:flex;flex-direction:column;z-index:50;transition:transform .25s;}
  .sb-brand{padding:18px 18px 14px;font-size:18px;font-weight:900;letter-spacing:-.5px;border-bottom:1px solid var(--borda2);}
  .sb-brand small{display:block;font-size:9px;color:var(--cinza2);letter-spacing:1.5px;font-weight:700;margin-top:3px;}
  .sb-nav{flex:1;overflow-y:auto;padding:10px 10px 20px;}
  .sb-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:var(--cinza);
    font-size:14px;font-weight:600;cursor:pointer;margin-bottom:2px;transition:.15s;}
  .sb-item .ic{width:20px;text-align:center;font-size:16px;}
  .sb-item:hover{background:var(--panel);color:#fff;}
  .sb-item.active{background:var(--grad);color:#04161a;box-shadow:0 4px 16px rgba(57,255,91,.3);}
  .sb-item.active .badge{background:rgba(4,22,26,.25);color:#04161a;}
  .sb-item .badge{margin-left:auto;background:rgba(57,255,91,.18);color:var(--neon);border-radius:999px;font-size:11px;padding:1px 8px;font-weight:800;}
  .sb-foot{padding:12px 16px;border-top:1px solid var(--borda2);font-size:12px;color:var(--cinza2);}
  .sb-foot b{color:#fff;font-weight:700;}
  .sb-logout{color:var(--erro);cursor:pointer;font-weight:700;margin-top:4px;display:inline-block;}

  .main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:40;background:rgba(6,24,29,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--borda2);padding:13px 20px;display:flex;align-items:center;gap:14px;}
  .burger{display:none;background:var(--panel);border:1px solid var(--borda2);color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;}
  .topbar h1{font-size:18px;margin:0;font-weight:800;}
  .topbar .search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--borda2);
    border-radius:11px;padding:8px 12px;min-width:160px;}
  .topbar .search input{background:none;border:none;color:#fff;outline:none;font-size:13px;width:100%;}
  .topbar .pulse{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ok);font-weight:700;}
  .topbar .pulse.demo{color:var(--amarelo);}
  .topbar .pulse .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:bl 1.6s infinite;}
  .topbar .pulse.demo .dot{background:var(--amarelo);box-shadow:0 0 8px var(--amarelo);}
  @keyframes bl{50%{opacity:.35;}}
  .content{padding:20px;flex:1;}

  /* ===== CARDS / KPIs ===== */
  .kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
  .kpi{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--borda2);border-radius:16px;padding:16px;position:relative;overflow:hidden;}
  .kpi .lbl{font-size:12px;color:var(--cinza2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .kpi .val{font-size:26px;font-weight:900;margin-top:6px;}
  .kpi .sub{font-size:12px;color:var(--cinza);margin-top:3px;}
  .kpi .ic{position:absolute;right:14px;top:14px;font-size:22px;opacity:.55;}
  .kpi.accent{border-color:var(--borda);box-shadow:0 0 22px rgba(57,255,91,.12);}
  .kpi.gold .val{color:var(--amarelo);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
  .grid3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:16px;}
  .panel{background:var(--panel);border:1px solid var(--borda2);border-radius:16px;padding:16px;}
  .panel h3{margin:0 0 12px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .panel h3 .mut{margin-left:auto;font-size:12px;color:var(--cinza2);font-weight:600;}
  .chart-wrap{position:relative;height:240px;}
  .mini-list{display:flex;flex-direction:column;gap:9px;}
  .mini-row{display:flex;align-items:center;gap:10px;font-size:13px;}
  .mini-row .nm{flex:1;}
  .mini-row .bar{height:7px;border-radius:6px;background:var(--grad);}
  .mini-row .vv{color:var(--cinza);font-weight:700;min-width:38px;text-align:right;}

  /* ===== KANBAN ===== */
  .kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:14px;align-items:flex-start;}
  .kcol{flex:0 0 280px;background:var(--petroleo2);border:1px solid var(--borda2);border-radius:16px;display:flex;flex-direction:column;max-height:calc(100vh - 150px);}
  .kcol-head{padding:13px 14px;border-bottom:1px solid var(--borda2);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--petroleo2);border-radius:16px 16px 0 0;}
  .kcol-head .dotc{width:9px;height:9px;border-radius:50%;}
  .kcol-head .t{font-size:13px;font-weight:800;}
  .kcol-head .c{margin-left:auto;background:var(--panel2);border-radius:999px;font-size:11px;font-weight:800;padding:2px 9px;color:var(--cinza);}
  .kcol-body{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;}
  .kcard{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--borda2);border-radius:13px;padding:12px;cursor:pointer;transition:.12s;}
  .kcard:hover{border-color:var(--borda);transform:translateY(-2px);}
  .kcard .kh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .kcard .num{font-weight:900;font-size:14px;}
  .kcard .time{font-size:11px;color:var(--cinza2);}
  .kcard .cli{font-size:13px;font-weight:700;}
  .kcard .addr{font-size:11.5px;color:var(--cinza);margin-top:2px;line-height:1.35;}
  .kcard .ktot{font-size:15px;font-weight:900;color:var(--amarelo);margin-top:7px;}
  .kcard .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .tag{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid var(--borda2);color:var(--cinza);}
  .tag.pay{color:var(--info);border-color:rgba(15,184,196,.4);}
  .tag.tipo{color:var(--neon);border-color:var(--borda);}

  /* ===== TABLES ===== */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--cinza2);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--borda2);}
  td{padding:11px 12px;border-bottom:1px solid var(--borda2);}
  tr:hover td{background:rgba(57,255,91,.03);}
  .t-wrap{background:var(--panel);border:1px solid var(--borda2);border-radius:16px;overflow:hidden;}
  .t-scroll{overflow-x:auto;}

  /* chips / pills */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;padding:3px 10px;border-radius:999px;}
  .pill.on{background:rgba(57,255,91,.14);color:var(--ok);} .pill.off{background:rgba(255,90,90,.12);color:#ff8a8a;}
  .pill.muted{background:var(--panel2);color:var(--cinza);}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:11px;font-weight:800;font-size:13px;}
  .btn-red{background:var(--grad);color:#04161a;box-shadow:0 4px 16px rgba(57,255,91,.28);}
  .btn-ghost{background:var(--panel);border:1px solid var(--borda2);color:#fff;}
  .btn-gold{background:linear-gradient(145deg,#ffe06b,var(--amarelo));color:#2a2200;}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:9px;}
  .btn-wa{background:#1faa52;color:#fff;}
  .btn-danger{background:linear-gradient(145deg,#ff7a7a,#ff5a5a);color:#1a0606;}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap;}

  .page-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .page-head .sp{flex:1;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .filters select,.filters input{background:var(--panel);border:1px solid var(--borda2);color:#fff;border-radius:10px;padding:8px 11px;font-size:12.5px;outline:none;}

  /* ===== MODAL ===== */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.66);opacity:0;pointer-events:none;transition:.2s;}
  .overlay.on{opacity:1;pointer-events:auto;}
  .modal{position:fixed;z-index:70;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);opacity:0;pointer-events:none;
    width:min(560px,94vw);max-height:90vh;overflow-y:auto;background:var(--panel);border:1px solid var(--borda);border-radius:18px;
    box-shadow:0 20px 60px rgba(0,0,0,.7);transition:.2s;}
  .modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
  .modal-head{position:sticky;top:0;background:var(--panel);padding:16px 18px;border-bottom:1px solid var(--borda2);display:flex;align-items:center;justify-content:space-between;z-index:2;}
  .modal-head h3{margin:0;font-size:17px;}
  .modal-x{background:var(--panel2);color:#fff;width:32px;height:32px;border-radius:9px;font-size:16px;}
  .modal-body{padding:16px 18px;}
  .modal-foot{position:sticky;bottom:0;background:var(--panel);padding:14px 18px;border-top:1px solid var(--borda2);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;}

  label.f{display:block;font-size:12px;color:var(--cinza);font-weight:700;margin:12px 0 5px;}
  .inp{width:100%;background:var(--petroleo2);border:1px solid var(--borda2);color:#fff;border-radius:11px;padding:11px 12px;font-size:14px;outline:none;font-family:inherit;}
  .inp:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(57,255,91,.13);}
  textarea.inp{resize:vertical;min-height:54px;}
  .ff2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .ff3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .switch{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--cinza);margin-top:10px;}
  .switch input{width:18px;height:18px;accent-color:var(--neon);}

  /* order detail */
  .od-items{background:var(--petroleo2);border:1px solid var(--borda2);border-radius:12px;padding:12px;margin-top:6px;font-size:13px;}
  .od-items .it{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed var(--borda2);gap:10px;}
  .od-items .it:last-child{border-bottom:none;}
  .od-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;margin-top:6px;}
  .od-grid .k{color:var(--cinza2);font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
  .status-flow{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .sf-btn{font-size:12px;font-weight:700;padding:7px 11px;border-radius:9px;background:var(--panel2);border:1px solid var(--borda2);color:var(--cinza);}
  .sf-btn.cur{background:var(--grad);color:#04161a;border-color:transparent;}
  .hist{margin-top:10px;font-size:12px;color:var(--cinza);}
  .hist .h{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--borda2);}
  .hist .h .tm{color:var(--cinza2);min-width:96px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);z-index:90;background:var(--panel2);border:1px solid var(--borda);
    color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:var(--shadow);transition:.25s;}
  .toast.on{transform:translateX(-50%) translateY(0);}
  .empty-st{text-align:center;color:var(--cinza2);padding:40px;font-size:13px;}

  .cfg-banner{background:rgba(15,184,196,.1);border:1px solid rgba(15,184,196,.3);color:#bdeef2;border-radius:12px;padding:11px 14px;font-size:12.5px;margin-bottom:16px;display:flex;gap:9px;align-items:center;}
  .cfg-banner.warn{background:rgba(255,208,46,.1);border-color:rgba(255,208,46,.35);color:#ffe9a8;}
  code{background:rgba(57,255,91,.1);padding:1px 5px;border-radius:5px;font-size:11.5px;}

  @media(max-width:860px){
    :root{--sidebar:0px;}
    .sidebar{transform:translateX(-100%);width:240px;}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;}
    .burger{display:inline-flex;align-items:center;justify-content:center;}
    .grid2,.grid3{grid-template-columns:1fr;}
    .topbar .search{display:none;}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45;display:none;}
    .scrim.on{display:block;}
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div class="login" id="login">
  <div class="login-card">
    <div class="login-logo">PLANETA<span class="neon"> BURGER</span> 👽🍔</div>
    <div class="login-sub">Painel Administrativo</div>
    <div class="login-slogan">O lanche de outro mundo</div>
    <input class="who" id="loginUser" type="text" placeholder="Usuário" autocomplete="username" />
    <input class="who" id="loginPass" type="password" placeholder="Senha" autocomplete="current-password" />
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-hint">Acesso restrito à equipe do Planeta Burger.</div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div class="shell" id="shell">
  <div class="scrim" id="scrim" onclick="toggleSidebar(false)"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">PLANETA<span class="neon"> BURGER</span> 👽<small>ADMIN · O LANCHE DE OUTRO MUNDO</small></div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot">
      <div>Operador: <b id="opName">—</b></div>
      <span class="sb-logout" onclick="logout()">Sair</span>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="burger" onclick="toggleSidebar(true)">☰</button>
      <h1 id="pageTitle">Dashboard</h1>
      <div class="pulse" id="livePulse"><span class="dot"></span> <span id="liveLabel">demo</span></div>
      <div class="search"><span>🔎</span><input id="globalSearch" placeholder="Buscar pedido, cliente, telefone..." oninput="onGlobalSearch(this.value)"/></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-head"><h3 id="modalTitle">—</h3><button class="modal-x" onclick="closeModal()">✕</button></div>
  <div class="modal-body" id="modalBody"></div>
  <div class="modal-foot" id="modalFoot"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   PLANETA BURGER — ADMIN (single-file estático)
   "O lanche de outro mundo" 👽🍔
   Lê pedidos do Supabase (tabela "orders") ou roda em MODO DEMONSTRAÇÃO.
   ============================================================ */

/* ------------------------------------------------------------
   SUPABASE — CONFIGURE AQUI
   Preencha com a URL do SEU projeto Supabase e a chave anon/publishable
   (a chave anon é pública e segura no client). A tabela "orders" precisa
   permitir SELECT e UPDATE para este painel (políticas RLS).
   Enquanto url/key ficarem vazios, o admin roda em MODO DEMONSTRAÇÃO
   com dados de exemplo embutidos (totalmente navegável offline).
   Para um cadeado real de acesso, use o app Next.js do projeto.
   ------------------------------------------------------------ */
const SUPA = { url:"", key:"" };

/* Senha do painel (apenas client-side, só para esconder a tela.
   Para autenticação real use o app Next.js). */
const CONFIG = {
  adminUser: "admin",
  adminPass: "planeta123",
  loja: {
    nome:"Planeta Burger", slogan:"O lanche de outro mundo",
    whatsapp:"5516996259742",
    endereco:"Rua do Hambúrguer, 100 - Centro", horario:"18h - 23h30 (ter a dom)",
    taxa:6.00, minimo:25.00, tempoMedio:"30-50 min",
    bairros:"Centro, Jardim, Vila Nova, São José", cnpj:"00.000.000/0001-00",
    msgPadrao:"Olá! Aqui é do Planeta Burger 👽🍔",
    politicaEntrega:"Entregamos nos bairros atendidos. O lanche de outro mundo chega rapidinho."
  }
};

/* ============================================================
   STATUS DO PEDIDO (fluxo do hambúrguer) — usado no kanban
   ============================================================ */
const STATUSES = [
  {key:"novo",            label:"Novo pedido",        color:"#0fb8c4"},
  {key:"recebido",        label:"Pedido recebido",    color:"#39ff5b"},
  {key:"em_atendimento",  label:"Em atendimento",     color:"#7dd6ff"},
  {key:"enviado_cozinha", label:"Enviado p/ cozinha", color:"#9b6dff"},
  {key:"em_preparo",      label:"Em preparo",         color:"#ff9a3d"},
  {key:"pronto",          label:"Pronto",             color:"#ffd02e"},
  {key:"saiu_entrega",    label:"Saiu p/ entrega",    color:"#0fb8c4"},
  {key:"entregue",        label:"Entregue",           color:"#39ff5b"},
  {key:"cancelado",       label:"Cancelado",          color:"#ff5a5a"},
];
const ST = Object.fromEntries(STATUSES.map(s=>[s.key,s]));
const DELIVERY_ST = ["Aguardando despacho","Em rota","Entregue","Falha na entrega","Cancelado"];
const CATEGORIES = ["Hambúrgueres","Combos","Acompanhamentos","Bebidas","Sobremesas","Promoções","Diversos"];
const PAGAMENTOS = ["Pix","Cartão","Dinheiro"];

/* ============================================================
   MENSAGENS AUTOMÁTICAS DE WHATSAPP POR STATUS
   placeholders: [nome] [numero] [tempo] [motivo]
   ============================================================ */
function waMsg(status, o){
  const n=o.numero, nome=(o.cliente||"").split(" ")[0]||"cliente", tempo=CONFIG.loja.tempoMedio, motivo=o.motivoCancel||"não informado";
  const M = {
    recebido:`Olá, ${nome}. Seu pedido #${n} foi recebido pelo Planeta Burger. Já estamos conferindo tudo por aqui. 👽🍔`,

/* ============================================================
   SUPABASE (backend real) — pedidos ao vivo na tabela "orders"
   ============================================================ */
function sbActive(){ return !!(SUPA.url && SUPA.key); }
function sbHeaders(extra){ return Object.assign({apikey:SUPA.key,Authorization:"Bearer "+SUPA.key,"Content-Type":"application/json"}, extra||{}); }
/* mapeia uma linha do Supabase -> objeto de pedido usado no painel */
function sbRowToOrder(r){ return {
  id:r.id, numero:r.numero, cliente:r.cliente, whatsapp:r.whatsapp,
  tipo:r.tipo||"entrega", endereco:r.endereco||"", bairro:r.bairro||"",
  pagamento:r.pagamento||"", troco:r.troco||"",
  itens:r.itens||[], subtotal:+r.subtotal||0, taxa:+r.taxa||0, total:+r.total||0,
  obs:r.obs||"", status:r.status||"novo", motivoCancel:r.motivo_cancel||"",
  entregador:r.entregador||"", created_at:r.created_at||nowISO(), historico:r.historico||[] }; }
/* mapeia objeto de pedido -> linha para PATCH no Supabase
   (só campos que o admin atualiza: status, historico, motivo, entregador) */
function sbOrderToPatch(o){ return { status:o.status, historico:o.historico, motivo_cancel:o.motivoCancel||"", entregador:o.entregador||"" }; }
/* PATCH /rest/v1/orders?numero=eq.<numero> */
function sbPatchOrder(o){ if(!sbActive()||!o.numero||(DB&&DB._demo)) return;
  fetch(SUPA.url+"/rest/v1/orders?numero=eq."+encodeURIComponent(o.numero),
    {method:"PATCH",headers:sbHeaders({Prefer:"return=minimal"}),body:JSON.stringify(sbOrderToPatch(o))})
    .catch(e=>console.warn("patch falhou",e)); }
let SB_POLL=null;
function sbSyncOrders(){
  if(!sbActive()) return Promise.resolve();
  return fetch(SUPA.url+"/rest/v1/orders?select=*&order=created_at.desc",{headers:sbHeaders()})
    .then(r=>r.json()).then(rows=>{
      if(Array.isArray(rows)){
        DB.orders=rows.map(sbRowToOrder); DB._demo=false; store.save();
        if(["pedidos","dashboard","financeiro","entregas","clientes"].indexOf(CURRENT)>=0) VIEWS[CURRENT]();
        renderSidebar(); updateLive();
      }
    }).catch(e=>console.warn("sync falhou",e));
}
function sbStartPolling(){ if(SB_POLL||!sbActive()) return; SB_POLL=setInterval(sbSyncOrders, 10000); }

function isDemo(){ return !sbActive() || (DB && DB._demo); }
function updateLive(){
  const p=document.getElementById("livePulse"), l=document.getElementById("liveLabel");
  if(!p||!l) return;
  if(isDemo()){ p.classList.add("demo"); l.textContent="modo demonstração"; }
  else { p.classList.remove("demo"); l.textContent="ao vivo"; }
}

let CHARTS=[];
function killCharts(){ CHARTS.forEach(c=>{try{c.destroy()}catch(e){}}); CHARTS=[]; }
function catOfItem(nome){ const p=DB.products.find(p=>p.nome===nome); return p?p.categoria:"Diversos"; }

function metrics(){
  const orders=DB.orders;
  const hoje=orders.filter(o=>isToday(o.created_at));
  const validos=hoje.filter(o=>o.status!=="cancelado");
  const fat=validos.reduce((s,o)=>s+o.total,0);
  const entregues=orders.filter(o=>o.status==="entregue");
  const cancelados=orders.filter(o=>o.status==="cancelado");
  const aberto=orders.filter(o=>!["entregue","cancelado"].includes(o.status));
  const vend={}; orders.forEach(o=>{ if(o.status==="cancelado")return; (o.itens||[]).forEach(i=>{ vend[i.n]=(vend[i.n]||0)+(Number(i.q)||0); }); });
  const topProd=Object.entries(vend).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const pag={}; orders.forEach(o=>{ if(o.status==="cancelado")return; pag[o.pagamento||"—"]=(pag[o.pagamento||"—"]||0)+1; });
  const cat={}; orders.forEach(o=>{ if(o.status==="cancelado")return; (o.itens||[]).forEach(i=>{ const c=catOfItem(i.n); cat[c]=(cat[c]||0)+(Number(i.p)||0)*(Number(i.q)||0); }); });
  return {hoje,validos,fat,entregues,cancelados,aberto,topProd,pag,cat, ticket: validos.length?fat/validos.length:0};
}

function logMove(o,de,para){ if(!Array.isArray(o.historico)) o.historico=[]; o.historico.push({ts:nowISO(),de,para,user:OP||"admin"}); }

function setStatus(id,status){
  const o=DB.orders.find(x=>x.id===id); if(!o)return;
  if(status==="cancelado"){ cancelOrder(id); return; }
  if(o.status===status){ toast("Pedido já está nesse status."); return; }
  const de=o.status; o.status=status; logMove(o,de,status); refresh(); sbPatchOrder(o);
  syncDelivery(o);
  const msg=waMsg(status,o);
  if(!msg){ toast("Status atualizado e registrado."); return; }
  openModal(`Status → ${ST[status].label}`,
    `<p style="color:var(--cinza);font-size:13px">Mensagem pronta para enviar ao cliente <b style="color:#fff">${esc(o.cliente)}</b>:</p>
     <div class="od-items" style="white-space:pre-line;color:#dcede8">${esc(msg)}</div>`,
    `<button class="btn btn-ghost btn-sm" onclick="closeModal()">Fechar</button>
     <button class="btn btn-wa" onclick="window.open(waLink('${o.whatsapp}',${JSON.stringify(msg)}),'_blank')">💬 Enviar no WhatsApp</button>`);
  toast("Status atualizado e registrado.");
}

/* mantém o módulo Entregas coerente com o status do pedido */
function syncDelivery(o){
  if(o.tipo==="retirada") return;
  let d=DB.deliveries.find(x=>x.pedidoNum===o.numero);
  if(o.status==="saiu_entrega"){
    if(!d){ d={id:uid("d"),pedidoNum:o.numero,endereco:o.endereco,bairro:o.bairro,entregador:o.entregador||"",status:"Em rota",taxa:o.taxa,tempo:CONFIG.loja.tempoMedio,obs:""}; DB.deliveries.push(d); }
    else d.status="Em rota";
  } else if(o.status==="entregue"&&d){ d.status="Entregue"; }
  store.save();
}

function pField(l,id,v,t,ph){ t=t||"text"; ph=ph||""; return `<label class="f">${l}</label><input class="inp" id="${id}" type="${t}" value="${v==null?"":esc(v)}" placeholder="${esc(ph)}"/>`; }
let IMG_TMP="";
function imgField(cur){ IMG_TMP=cur||"";
  return `<label class="f">Foto do produto</label>
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:2px">
      <img id="imgPreview" src="${IMG_TMP}" style="width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid var(--borda2);background:var(--panel2);${IMG_TMP?"":"display:none"}"/>
      <div style="flex:1"><input type="file" accept="image/*" id="imgInput" onchange="pickImage(this)" style="font-size:12px;color:var(--cinza);width:100%"/>
        <div style="font-size:11px;color:var(--cinza2);margin-top:3px">JPG/PNG do seu aparelho · redimensiona sozinho</div></div>
      <button class="btn btn-ghost btn-sm" type="button" id="imgClear" onclick="clearImage()" style="${IMG_TMP?"":"display:none"}">Remover</button>
    </div>`;
}
function pickImage(input){
  var file=input.files&&input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var max=480, scale=Math.min(1,max/Math.max(img.width,img.height));
      var cv=document.createElement("canvas"); cv.width=Math.round(img.width*scale); cv.height=Math.round(img.height*scale);
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      IMG_TMP=cv.toDataURL("image/jpeg",0.72);
      var pv=document.getElementById("imgPreview"); if(pv){ pv.src=IMG_TMP; pv.style.display=""; }
      var cl=document.getElementById("imgClear"); if(cl) cl.style.display="";
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearImage(){ IMG_TMP=""; var pv=document.getElementById("imgPreview"); if(pv){pv.src="";pv.style.display="none";} var cl=document.getElementById("imgClear"); if(cl)cl.style.display="none"; var inp=document.getElementById("imgInput"); if(inp)inp.value=""; }

function saveProduct(id){
  const g=x=>document.getElementById(x);
  const data={nome:g("p_nome").value.trim(),categoria:g("p_cat").value,descricao:g("p_desc").value.trim(),

function saveCombo(){
  const g=x=>document.getElementById(x);
  const inclusos=[...g("cb_itens").selectedOptions].map(o=>o.value);
  const nome=g("cb_nome").value.trim(); if(!nome){ toast("Informe o nome."); return; }
  const desc=g("cb_desc").value.trim()||inclusos.join(" + ");
  DB.products.push({id:uid("p"),nome,categoria:"Combos",descricao:desc,preco:parseFloat(g("cb_preco").value)||0,

let IMGS={};
function imgSlot(key,label,cur){ IMGS[key]=cur||"";
  return `<label class="f">${label}</label><div style="display:flex;gap:10px;align-items:center;margin-bottom:2px">
    <img id="prev_${key}" src="${IMGS[key]}" style="width:54px;height:54px;border-radius:10px;object-fit:cover;border:1px solid var(--borda2);background:var(--panel2);${IMGS[key]?"":"display:none"}"/>
    <input type="file" accept="image/*" id="in_${key}" onchange="pickImg('${key}',this)" style="font-size:12px;color:var(--cinza)"/>
    <button class="btn btn-ghost btn-sm" type="button" id="clr_${key}" onclick="clearImg('${key}')" style="${IMGS[key]?"":"display:none"}">✕</button></div>`; }
function pickImg(key,input){ var fl=input.files&&input.files[0]; if(!fl)return; var rd=new FileReader();
  rd.onload=function(e){ var img=new Image(); img.onload=function(){ var mx=640,sc=Math.min(1,mx/Math.max(img.width,img.height));
    var cv=document.createElement("canvas"); cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height); IMGS[key]=cv.toDataURL("image/jpeg",0.7);
    var pv=document.getElementById("prev_"+key); if(pv){pv.src=IMGS[key];pv.style.display="";} var cl=document.getElementById("clr_"+key); if(cl)cl.style.display=""; }; img.src=e.target.result; }; rd.readAsDataURL(fl); }
function clearImg(key){ IMGS[key]=""; var pv=document.getElementById("prev_"+key); if(pv){pv.src="";pv.style.display="none";} var cl=document.getElementById("clr_"+key); if(cl)cl.style.display="none"; var inp=document.getElementById("in_"+key); if(inp)inp.value=""; }
function fileSlot(key,label,cur,curName){ IMGS[key]=cur||""; IMGS[key+"_n"]=curName||"";
  return `<label class="f">${label}</label><div style="display:flex;gap:10px;align-items:center;margin-bottom:2px">
    <input type="file" accept=".pdf,image/*" id="in_${key}" onchange="pickFile('${key}',this)" style="font-size:12px;color:var(--cinza)"/>
    <a id="lnk_${key}" href="${IMGS[key]||'#'}" target="_blank" class="btn btn-ghost btn-sm" style="${IMGS[key]?"":"display:none"}">📄 ${IMGS[key+"_n"]||"ver"}</a>
    <button class="btn btn-ghost btn-sm" type="button" id="clrf_${key}" onclick="clearFile('${key}')" style="${IMGS[key]?"":"display:none"}">✕</button></div>`; }
function pickFile(key,input){ var fl=input.files&&input.files[0]; if(!fl)return; var rd=new FileReader();
  rd.onload=function(e){ IMGS[key]=e.target.result; IMGS[key+"_n"]=fl.name; var ln=document.getElementById("lnk_"+key); if(ln){ln.href=IMGS[key];ln.textContent="📄 "+fl.name;ln.style.display="";} var cl=document.getElementById("clrf_"+key); if(cl)cl.style.display=""; toast("Anexado: "+fl.name); }; rd.readAsDataURL(fl); }
function clearFile(key){ IMGS[key]="";IMGS[key+"_n"]=""; var ln=document.getElementById("lnk_"+key); if(ln)ln.style.display="none"; var cl=document.getElementById("clrf_"+key); if(cl)cl.style.display="none"; var inp=document.getElementById("in_"+key); if(inp)inp.value=""; }

VIEWS.financeiro=function(){
  const valid=DB.orders.filter(o=>o.status!=="cancelado");
  const now=new Date(); const weekAgo=Date.now()-7*86400000;
  const sum=arr=>arr.reduce((s,o)=>s+(o.total||0),0);
  const day=valid.filter(o=>isToday(o.created_at));
  const week=valid.filter(o=>new Date(o.created_at).getTime()>=weekAgo);
  const month=valid.filter(o=>{const d=new Date(o.created_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const byPag=p=>sum(valid.filter(o=>o.pagamento===p));
  const taxas=valid.filter(o=>o.tipo!=="retirada").reduce((s,o)=>s+(o.taxa||0),0);
  const cancelados=DB.orders.filter(o=>o.status==="cancelado");
  const recent=DB.orders.slice().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,15);
  const head=demoBanner()+`
    <div class="kpis">
      <div class="kpi gold"><div class="lbl">Faturamento hoje</div><div class="val">${brl(sum(day))}</div><div class="sub">${day.length} pedidos</div><span class="ic">💰</span></div>
      <div class="kpi"><div class="lbl">Últimos 7 dias</div><div class="val">${brl(sum(week))}</div><div class="sub">${week.length} pedidos</div><span class="ic">📆</span></div>
      <div class="kpi"><div class="lbl">No mês</div><div class="val">${brl(sum(month))}</div><div class="sub">${month.length} pedidos</div><span class="ic">📈</span></div>
      <div class="kpi"><div class="lbl">Ticket médio</div><div class="val">${brl(valid.length?sum(valid)/valid.length:0)}</div><div class="sub">geral</div><span class="ic">🎯</span></div>
      <div class="kpi"><div class="lbl">Taxas de entrega</div><div class="val">${brl(taxas)}</div><div class="sub">acumulado</div><span class="ic">🛵</span></div>
      <div class="kpi"><div class="lbl">Cancelados</div><div class="val" style="color:#ff8a8a">${cancelados.length}</div><div class="sub">${brl(cancelados.reduce((s,o)=>s+(o.total||0),0))} perdidos</div><span class="ic">⚠️</span></div>
    </div>
    <div class="grid2">
      <div class="panel"><h3>💳 Recebimentos por forma de pagamento</h3>
        <div class="mini-list">${PAGAMENTOS.map(p=>{ const v=byPag(p); const max=Math.max(1,...PAGAMENTOS.map(byPag));
          return `<div class="mini-row"><span class="nm">${p}</span><span class="bar" style="width:${Math.max(18,v/max*150)}px"></span><span class="vv">${brl(v)}</span></div>`; }).join("")}</div>
      </div>
      <div class="panel"><h3>🧾 Resumo</h3>
        <div class="od-grid">
          <div><div class="k">Pedidos válidos</div>${valid.length}</div>
          <div><div class="k">Faturamento total</div>${brl(sum(valid))}</div>
          <div><div class="k">Entregas</div>${valid.filter(o=>o.tipo!=="retirada").length}</div>
          <div><div class="k">Retiradas</div>${valid.filter(o=>o.tipo==="retirada").length}</div>
        </div>
        <div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ Imprimir relatório</button></div>
      </div>
    </div>`;
  const rows=recent.map(o=>`<tr>
    <td><b>#${esc(o.numero)}</b></td><td>${esc(o.cliente)}</td><td>${fmtDateTime(o.created_at)}</td>
    <td>${esc(o.pagamento)}</td><td>${tipoLabel(o.tipo)}</td>
    <td><span class="pill" style="background:rgba(159,196,201,.1);color:${ST[o.status]?ST[o.status].color:"#fff"}">${ST[o.status]?ST[o.status].label:esc(o.status)}</span></td>
    <td style="color:var(--amarelo);font-weight:800">${brl(o.total)}</td></tr>`).join("")||'<tr><td colspan="7" class="empty-st">Sem movimentações.</td></tr>';
  document.getElementById("content").innerHTML=head+`
    <div class="panel" style="margin-top:16px"><h3>📋 Últimas movimentações</h3>
    <div class="t-scroll"><table><thead><tr><th>Pedido</th><th>Cliente</th><th>Data/Hora</th><th>Pagamento</th><th>Tipo</th><th>Status</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
};

  const supaStatus = sbActive()
    ? `<span class="pill on">conectado</span>`
    : `<span class="pill off">não configurado (modo demonstração)</span>`;
  document.getElementById("content").innerHTML=demoBanner()+`
    <div class="grid2">
      <div class="panel"><h3>🏪 Dados da loja</h3>
        ${pField("Nome","cfg_nome",s.nome)}
        ${pField("Slogan","cfg_slogan",s.slogan)}
        <div class="ff2"><div>${pField("WhatsApp","cfg_wpp",s.whatsapp,"text","5516...")}</div><div>${pField("Horário","cfg_horario",s.horario)}</div></div>
        ${pField("Endereço","cfg_end",s.endereco)}
        <div class="ff3"><div>${pField("Taxa entrega (R$)","cfg_taxa",s.taxa,"number")}</div><div>${pField("Pedido mín. (R$)","cfg_min",s.minimo,"number")}</div><div>${pField("Tempo médio","cfg_tempo",s.tempoMedio)}</div></div>
        ${pField("Bairros atendidos","cfg_bairros",s.bairros)}
        <div style="margin-top:14px"><button class="btn btn-red" onclick="saveSettings()">Salvar dados da loja</button></div>
      </div>
      <div class="panel"><h3>🔌 Supabase (backend de pedidos)</h3>
        <p style="color:var(--cinza);font-size:12.5px;line-height:1.6">Status: ${supaStatus}<br>
        Para conectar ao banco real, edite no código as constantes:<br>
        <code>const SUPA = { url:"...", key:"..." }</code><br>
        com a URL do seu projeto Supabase e a chave <b>anon/publishable</b>. A tabela <b>orders</b> precisa permitir <b>SELECT</b> e <b>UPDATE</b> (políticas RLS). Os pedidos do site cliente são gravados nessa tabela; este painel lê e atualiza o status deles.</p>
        <p style="color:var(--cinza2);font-size:12px">Você também pode testar a conexão preenchendo abaixo (válido só nesta sessão):</p>
        ${pField("Supabase URL","cfg_supaurl",SUPA.url,"text","https://xxxx.supabase.co")}
        ${pField("Supabase anon key","cfg_supakey",SUPA.key,"text","sb_publishable_...")}
        <div class="row-actions" style="margin-top:12px">
          <button class="btn btn-red btn-sm" onclick="applySupa()">Conectar / Sincronizar</button>
          <button class="btn btn-ghost btn-sm" onclick="store.reset();toast('Dados de demonstração recarregados.');go('dashboard')">Recarregar dados demo</button>
        </div>
      </div>
    </div>
    <div class="panel" style="margin-top:16px"><h3>📲 Mensagens automáticas (WhatsApp)</h3>
      <div class="od-items" style="font-size:12.5px;line-height:1.7">${STATUSES.filter(s=>waMsg(s.key,{numero:"0000",cliente:"Cliente",motivoCancel:"—"})).map(s=>`<div class="it"><span style="color:${s.color};font-weight:800;min-width:130px">${s.label}</span><span style="color:var(--cinza);text-align:left">${esc(waMsg(s.key,{numero:"0000",cliente:"Cliente",motivoCancel:"—"}))}</span></div>`).join("")}</div>
      <p style="color:var(--cinza2);font-size:11.5px;margin-top:10px">Cada mudança de status oferece um botão para enviar a mensagem ao cliente.</p>
    </div>`;
};
function saveSettings(){
  const g=x=>document.getElementById(x);
  DB.settings=Object.assign({},DB.settings,{
    nome:g("cfg_nome").value.trim(),slogan:g("cfg_slogan").value.trim(),whatsapp:g("cfg_wpp").value.trim(),
    horario:g("cfg_horario").value.trim(),endereco:g("cfg_end").value.trim(),
    taxa:parseFloat(g("cfg_taxa").value)||0,minimo:parseFloat(g("cfg_min").value)||0,tempoMedio:g("cfg_tempo").value.trim(),
    bairros:g("cfg_bairros").value.trim()});
  CONFIG.loja.whatsapp=DB.settings.whatsapp||CONFIG.loja.whatsapp;
  CONFIG.loja.tempoMedio=DB.settings.tempoMedio||CONFIG.loja.tempoMedio;
  store.save(); toast("Configurações salvas.");
}
function applySupa(){
  const u=document.getElementById("cfg_supaurl").value.trim();
  const k=document.getElementById("cfg_supakey").value.trim();
  SUPA.url=u; SUPA.key=k;
  if(sbActive()){
    toast("Conectando ao Supabase...");
    sbSyncOrders().then(()=>{ sbStartPolling(); updateLive(); toast("Conectado. Pedidos ao vivo."); go("pedidos"); });
  } else { updateLive(); toast("Preencha URL e chave para conectar."); }
}

/* ============================================================
   BOOT
   ============================================================ */
function boot(){
  store.load();
  updateLive();
  renderSidebar();
  go("dashboard");
  if(sbActive()){ sbSyncOrders().then(()=>{ sbStartPolling(); updateLive(); }); }
}

/* sessão lembrada */
(function(){
  try{
    const sess=JSON.parse(localStorage.getItem("planetaburger_session")||"null");
    if(sess&&sess.op){ OP=sess.op; document.getElementById("login").style.display="none"; document.getElementById("shell").classList.add("on"); boot(); }
  }catch(e){}
})();

/* atalhos de teclado */
document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&document.getElementById("login").style.display!=="none"){ doLogin(); }
  if(e.key==="Escape"){ closeModal(); }
});
</script>
